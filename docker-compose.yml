services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mern_tools_suite
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/mern_tools_suite
      CLIENT_ORIGIN: http://localhost:8080
      SITE_URL: http://localhost:8080
      TMP_DIR: /app/storage/tmp
    depends_on:
      mongo:
        condition: service_healthy
    tmpfs:
      - /app/storage/tmp

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_SITE_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo_data:
